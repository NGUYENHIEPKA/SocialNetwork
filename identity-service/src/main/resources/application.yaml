server:
  port: ${PORT:8080}
  servlet:
    context-path: /identity

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/identity_service}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driverClassName: "com.mysql.cj.jdbc.Driver"
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  mail:
    username: ${MAIL_USERNAME:rjack1356@gmail.com}
    password: ${MAIL_PASSWORD:aeqf nrfq snoc pryj}
    host: "smtp.gmail.com"
    port: 465
    properties:
      mail:
        debug: true
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

jwt:
  signerKey: ${JWT_SIGNER_KEY:default_signer_key_at_least_32_characters_long}
  valid-duration: ${JWT_VALID_DURATION:3600} # in second
  refreshable-duration: ${JWT_REFRESHABLE_DURATION:36000} # in second

app:
  service:
    profile: ${PROFILE_SERVICE_URL:http://localhost:8081/profile}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false